exp_name: qm9_hogdiff

ckpt: 'checkpoints/qm9/qm9.pth'

data:
  name: qm9
  max_node: 9
  lifting_type: 'CCs'
  max_media_size: 9
  min_media_size: 4
  atom_channels: 4
  norm: [2.0, 1.0]
  centered: True
  latent_space: 'Laplacian'
  re_process: False
  re_lifting: False

exp:
  plot: False

training:
  n_iters: 92000
  batch_size: 32
  continuous: True
  reduce_mean: False
  likelihood_weighting: False
  log_freq: 200
  snapshot_freq: 2000
  snapshot_freq_for_preemption: 2000
  snapshot_sampling: True
  training_strategy: 'DenoisingScoreMatching'
  seed: 12

OUtraining:
  n_iters: 102000
  batch_size: 512
  continuous: True
  reduce_mean: False
  likelihood_weighting: False
  log_freq: 200
  snapshot_freq: 2000
  snapshot_freq_for_preemption: 2000
  snapshot_sampling: True
  training_strategy: 'DenoisingScoreMatching'
  seed: 12
  weight_atom: 3.0
  weight_bond: 1.0


eval:
  batch_size: 10000
  num_samples: 10000
  metrics: ['validity', 'uniqueness', 'novelty', 'FCD', 'NSPDK']
  save_graph: False
  seed: 12

sampling:
  method: 'pc'
  predictor: Euler
  corrector: Langevin
  n_steps: 8
  noise_removal: True
  probability_flow: False
  atom_snr: 0.3
  bond_snr: 0.2
  scale_eps: 0.1

OUsampling:
  method: 'pc'
  predictor: Euler
  corrector: Langevin
  n_steps: 0
  noise_removal: True
  probability_flow: False
  atom_snr: None
  bond_snr: None
  scale_eps: None

sde:
  type: 'VPSDE'
  atom:
    num_scales: 1000  # SDE total steps (N)
    schedule: 'linear'
    beta_min: 0.1
    beta_max: 1.0
  bond:
    num_scales: 1000
    schedule: 'linear'
    beta_min: 0.1
    beta_max: 1.0

OUsde:
  type: 'OUBridge'
  atom:
    num_scales: 800
    schedule: 'linear'
    max_sigma: 0.1
  bond:
    num_scales: 800
    schedule: 'linear'
    max_sigma: 0.1

model:
  type: 'ScoreNet'
  ema_rate: 0.9999
  nonlinearity: 'swish'
  nf: 32
  num_gnn_layers: 7
  rw_depth: 4
  graph_layer: 'GINE'
  edge_th: 1/6
  heads: 4
  dropout: 0.05
  bond_hid: 6

OUmodel:
  type: 'ConScoreNet'
  ema_rate: 0.9999
  nonlinearity: 'swish'
  nf: 512
  num_gnn_layers: 8
  rw_depth: 4
  edge_th: 1/6
  heads: 8
  dropout: 0.2
  bond_hid: 7

optim:
  weight_decay: 0
  lr: 0.001
  beta1: 0.9
  eps: 1.0e-8
  warmup: 1000
  grad_clip: 2.0
  optimizer: 'Adam'

OUoptim:
  weight_decay: 0
  lr: 0.0007
  beta1: 0.9
  eps: 1.0e-8
  warmup: 1000
  grad_clip: 3.0
  optimizer: 'Adam'
