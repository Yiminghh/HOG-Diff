ckpt: 'checkpoints/sbm/sbm.pth'

data:
  name: sbm
  max_node: 187
  lifting_type: 'SCs'
  max_media_size: 20
  min_media_size: 4
  feat:
    type:
      - eig1
      - eig2
    scale: 10
    norm: True
  atom_channels: 2
  norm: [1.0, 1.0]
  centered: False
  latent_space: 'Laplacian'
  re_lifting: False


exp:
  plot: False

training:
  n_iters: 100000
  batch_size: 24
  continuous: True
  reduce_mean: False
  likelihood_weighting: False
  log_freq: 100
  snapshot_freq: 2000
  snapshot_freq_for_preemption: 500
  snapshot_sampling: True
  training_strategy: 'DenoisingScoreMatching'
  weight_atom: 0.5
  seed: 42

OUtraining:
  n_iters: 100000
  batch_size: 32
  continuous: True
  reduce_mean: False
  likelihood_weighting: False
  log_freq: 100
  snapshot_freq: 1000
  snapshot_freq_for_preemption: 1000
  snapshot_sampling: True
  training_strategy: 'DenoisingScoreMatching'
  weight_atom: 0.01
  seed: 42

eval:
  batch_size: 40
  save_graph: False
  seed: 42

sampling:
  method: 'pc'
  predictor: Euler
  corrector: Langevin
  n_steps: 5
  noise_removal: True
  probability_flow: False
  atom_snr: 0.01
  bond_snr: 0.05
  scale_eps: 0.5

OUsampling:
  method: 'pc'
  predictor: Euler
  corrector: Langevin
  n_steps: 2
  noise_removal: True
  probability_flow: False
  atom_snr: 0.05
  bond_snr: 0.15
  scale_eps: 0.4

sde:
  type: 'VPSDE'
  atom:
    num_scales: 300  # SDE total steps (N)
    schedule: 'linear'
    beta_min: 0.2
    beta_max: 0.9
  bond:
    num_scales: 300
    schedule: 'linear'
    beta_min: 0.2
    beta_max: 0.9

OUsde:
  type: 'OUBridge'
  atom:
    num_scales: 300
    schedule: 'cosine'
    max_sigma: 1.
  bond:
    num_scales: 300
    schedule: 'cosine'
    max_sigma: 1.

model:
  type: 'ScoreNet'
  ema_rate: 0.9999
  nonlinearity: 'swish'
  nf: 32
  num_gnn_layers: 6
  heads: 8
  dropout: 0.05
  bond_hid: 6
  rw_depth: 4
  edge_th: 0.5

OUmodel:
  type: 'ConScoreNet'
  ema_rate: 0.9999
  nonlinearity: 'swish'
  nf: 32
  num_gnn_layers: 4
  heads: 4
  dropout: 0.1
  bond_hid: 6
  rw_depth: 8
  edge_th: 0.5

optim:
  weight_decay: 0
  lr: 0.0003
  beta1: 0.9
  eps: 0.0002
  warmup: 1000
  grad_clip: 1.0
  optimizer: 'Adam'

OUoptim:
  weight_decay: 0
  lr: 0.0007
  beta1: 0.9
  eps: 0.0002
  warmup: 1000
  grad_clip: 1.0
  optimizer: 'Adam'
